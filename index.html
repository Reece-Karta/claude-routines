<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Triage Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6fa;
      color: #2d3436;
      padding: 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: #636e72;
    }

    .empty-state h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #2d3436;
    }

    .empty-state p {
      font-size: 1.05rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="empty-state">
    <h1>Email Triage Dashboard</h1>
    <p>Waiting for the first scheduled run to populate this dashboard.<br>The routine runs weekdays at 7:00 AM AEST.</p>
  </div>
</body>
</html>
